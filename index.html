// ── HOOKS ──────────────────────────────────────────────────────
function useLocalStorage(key,def){
  const[val,setVal]=useState(()=>{
    try{const s=localStorage.getItem(key);return s?JSON.parse(s):def;}
    catch{return def;}
  });
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}},[key,val]);
  return[val,setVal];
}

function useToast(){
  const[toasts,setToasts]=useState([]);
  const add=useCallback((msg,type='success')=>{
    const id=Date.now()+Math.random();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);
  },[]);
  const remove=useCallback((id)=>setToasts(t=>t.filter(x=>x.id!==id)),[]);
  return{toasts,addToast:add,removeToast:remove};
}

// ── SYNC HOOK ─────────────────────────────────────────────────
// status: 'idle' | 'syncing' | 'ok' | 'error' | 'offline'
function useSupaSync(){
  const[status,setStatus]=useState('idle');
  const[configured,setConfigured]=useState(()=>!!localStorage.getItem('supa_cfg'));
  const clientRef=useRef(null);
  const debounceRef=useRef({});

  useEffect(()=>{
    clientRef.current=getSupaClient();
    setConfigured(!!clientRef.current);
  },[]);

  async function loadAll(){
    if(!clientRef.current)return null;
    setStatus('syncing');
    try{
      const{data,error}=await clientRef.current.from('app_data').select('*');
      if(error)throw error;
      setStatus('ok');
      return(data||[]).reduce((acc,r)=>({...acc,[r.key]:r.value}),{});
    }catch(e){
      console.warn('Supabase load error:',e);
      setStatus('error');
      return null;
    }
  }

  function push(key,value){
    if(!clientRef.current)return;
    clearTimeout(debounceRef.current[key]);
    debounceRef.current[key]=setTimeout(async()=>{
      setStatus('syncing');
      try{
        const{error}=await clientRef.current.from('app_data')
          .upsert({key,value,updated_at:new Date().toISOString()},{onConflict:'key'});
        if(error)throw error;
        setStatus('ok');
      }catch(e){
        console.warn('Supabase push error:',e);
        setStatus('error');
      }
    },1500);
  }

  function configure(url,key){
    const cfg={url,key};
    localStorage.setItem('supa_cfg',JSON.stringify(cfg));
    clientRef.current=supabase.createClient(url,key);
    setConfigured(true);
    setStatus('idle');
  }

  function disconnect(){
    localStorage.removeItem('supa_cfg');
    clientRef.current=null;
    setConfigured(false);
    setStatus('idle');
  }

  return{status,configured,loadAll,push,configure,disconnect};
}

async function geocodeAddress(address){
  try{
    const r=await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`,
      {headers:{'Accept-Language':'pt','User-Agent':'ArbitroAAViseu/1.0'}}
    );
    const d=await r.json();
    if(d&&d.length>0)return{lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon)};
  }catch{}
  return null;
}
async function getRouteKm(lat1,lon1,lat2,lon2){
  try{
    const r=await fetch(`https://router.project-osrm.org/route/v1/driving/${lon1},${lat1};${lon2},${lat2}?overview=false`);
    const d=await r.json();
    if(d.code==='Ok'&&d.routes?.[0])return d.routes[0].distance/1000;
  }catch{}
  return null;
}

// ── PDF PARSER ─────────────────────────────────────────────────
async function parsePDF(file,settings){
  if(!window.pdfjsLib)throw new Error('PDF.js não carregado');
  const buf=await file.arrayBuffer();
  const pdf=await pdfjsLib.getDocument({data:buf}).promise;
  const allItems=[];
  for(let p=1;p<=pdf.numPages;p++){
    const page=await pdf.getPage(p);
    const tc=await page.getTextContent();
    const vp=page.getViewport({scale:1});
    tc.items.forEach(item=>{
      if(item.str.trim())allItems.push({text:item.str,x:item.transform[4],y:vp.height-item.transform[5],page:p});
    });
  }
  allItems.sort((a,b)=>a.page!==b.page?a.page-b.page:a.y-b.y);
  const rows=[];let curRow=null,curY=-999,curPage=-1;
  allItems.forEach(item=>{
    if(Math.abs(item.y-curY)>5||item.page!==curPage){
      curRow=[];rows.push(curRow);curY=item.y;curPage=item.page;
    }
    curRow.push(item);
  });
  const lines=rows.map(r=>r.sort((a,b)=>a.x-b.x).map(i=>i.text.trim()).filter(Boolean).join(' '));
  const filters=settings.userFilter||['AFONSO FERNANDES','233690'];
  const games=[];
  for(const line of lines){
    const up=line.toUpperCase();
    if(!filters.some(f=>up.includes(f.toUpperCase())))continue;
    const dateMatch=line.match(/(\d{2}-\d{2}-\d{4})/);
    if(!dateMatch)continue;
    const date=dateMatch[1];
    const timeMatch=line.match(/(\d{2}:\d{2})/);
    const time=timeMatch?timeMatch[1]:'00:00';
    const arbPattern=/([A-ZÁÀÃÂÉÊÍÓÔÕÚÜÇA-Z][A-ZÁÀÃÂÉÊÍÓÔÕÚÜÇ\s]+)-(\d{5,6})/g;
    const arbs=[];let m;
    while((m=arbPattern.exec(up))!==null)arbs.push({name:m[1].trim(),id:m[2]});
    const afterTime=line.substring((timeMatch?line.indexOf(time)+5:0));
    const jnMatch=afterTime.match(/\b(\d{3,5})\b/);
    const jn=jnMatch?jnMatch[1]:'';
    // PO: first standalone 1-2 digit number after the teams (PO SERIE JOR pattern)
    // Tokenise and find consecutive number run after "vs"
    let po='';
    {
      const toks=line.split(/\s+/);
      const vsT=toks.findIndex(t=>t.toLowerCase()==='vs');
      if(vsT>=0){
        // skip teamB name (non-digit tokens after vs), then collect number run
        let seenTeamB=false;
        const numRun=[];
        for(let i=vsT+1;i<toks.length;i++){
          const isNum=/^\d{1,3}$/.test(toks[i]);
          if(!isNum){
            if(seenTeamB&&numRun.length>0)break; // end of run
            if(!isNum)seenTeamB=true;
          } else {
            seenTeamB=true;
            numRun.push(toks[i]);
            if(numRun.length===3)break;
          }
        }
        if(numRun.length>=1)po=String(parseInt(numRun[0])).padStart(2,'0');
      }
      // Fallback: look for " vs WORD [WORD] (1-2digits) (1-2digits) (1-3digits)"
      if(!po){
        const m=line.match(/\bvs\s+(?:[A-ZÀ-Ú]+\s+)*?(\d{1,2})\s+\d{1,2}\s+\d{1,3}/i);
        if(m)po=String(parseInt(m[1])).padStart(2,'0');
      }
    }
    const vsMatch=line.match(/([A-ZÁÀÃÂÉÊÍÓÔÕÚÜÇA-Za-záàãâéêíóôõúüç]+(?:\s+[A-ZÁÀÃÂÉÊÍÓÔÕÚÜÇA-Za-z]+)*)\s+vs\s+([A-ZÁÀÃÂÉÊÍÓÔÕÚÜÇA-Za-záàãâéêíóôõúüç]+(?:\s+[A-ZÁÀÃÂÉÊÍÓÔÕÚÜÇA-Za-z]+)*?)(?:\s+\d)/i);
    const teamA=vsMatch?vsMatch[1].trim():'';
    const teamB=vsMatch?vsMatch[2].trim():'';
    let local='';
    if(jn&&teamA){
      const jnIdx=line.indexOf(jn);
      const teamIdx=line.indexOf(teamA,jnIdx);
      if(jnIdx>=0&&teamIdx>jnIdx)local=line.substring(jnIdx+jn.length,teamIdx).trim();
    }
    const myId=filters.find(x=>/^\d+$/.test(x));
    const arbitroRole=arbs.findIndex(a=>a.id===myId||filters.some(f=>{
      const parts=f.toUpperCase().split(' ');
      return parts.every(p=>a.name.includes(p));
    }))+1||2;
    const game={
      id:`g_${jn||uid()}_${date.replace(/-/g,'')}`,
      date,time,jn,local,teamA,teamB,po,
      arbitro1:arbs[0]?`${arbs[0].name}-${arbs[0].id}`:'',
      arbitro2:arbs[1]?`${arbs[1].name}-${arbs[1].id}`:'',
      isArbitro1:arbitroRole===1,
      status:'confirmado',concentracao:false,
      manualPrize:null,manualKm:null,manualSubsidio:null,
      pavilhaoId:null,distanceKm:null,rawLine:line
    };
    if(!games.find(g=>g.jn&&g.jn===jn))games.push(game);
  }
  return games;
}

// ── UTILS ──────────────────────────────────────────────────────
// Normalise PO for comparison: '8' → '08', '04' → '04', 'SR_M' → 'SR_M'
function normPO(po){
  if(!po&&po!==0)return'';
  const s=String(po).trim();
  const n=parseInt(s,10);
  return isNaN(n)?s:String(n).padStart(2,'0');
}
function getPrizeForPO(po,s){
  const np=normPO(po);
  return(s.poMappings.find(x=>normPO(x.po)===np)?.prize)||0;
}
function getEscalaoForPO(po,s){
  const np=normPO(po);
  return(s.poMappings.find(x=>normPO(x.po)===np)?.escalao)||(po?`PO ${po}`:'—');
}
function timeInWindow(time,windows){
  if(!time||!windows)return false;
  const[h,mi]=time.split(':').map(Number);const mins=h*60+mi;
  return windows.some(w=>{
    const[sh,sm]=w.start.split(':').map(Number);const[eh,em]=w.end.split(':').map(Number);
    return mins>=sh*60+sm&&mins<=eh*60+em;
  });
}
function calcGameTotals(game,s){
  const prize=game.manualPrize!==null?game.manualPrize:(getPrizeForPO(game.po,s)-(game.concentracao?2:0));
  const kmDist=game.manualKm!==null?game.manualKm:(game.distanceKm||0);
  const kmEuros=kmDist*2*(s.kmRate||0.36);
  const subsEligible=game.manualSubsidio!==null?game.manualSubsidio:timeInWindow(game.time,s.subsidioWindows);
  const subsidio=subsEligible?(s.subsidioAmount||14):0;
  return{prize,kmDist,kmEuros,subsidio,total:prize+kmEuros+subsidio};
}
function fmtEuro(n){return(n||0).toFixed(2).replace('.',',')+'€';}
function getMonthKey(d){if(!d)return'';const[,mo,yr]=d.split('-');return`${yr}-${mo}`;}
function addMonths(yrMon,n){
  if(!yrMon)return'';
  const[yr,mo]=yrMon.split('-').map(Number);
  const d=new Date(yr,mo-1+n,1);
  return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}
function monthLabel(k){if(!k)return'';const[yr,mo]=k.split('-');return`${MONTHS_PT[parseInt(mo)-1]} ${yr}`;}
function fuzzyMatch(local,pavilhoes){
  if(!local)return null;
  const up=local.toUpperCase().trim();
  return pavilhoes.find(p=>p.alias&&(up===p.alias.toUpperCase()||up.includes(p.alias.toUpperCase())||p.alias.toUpperCase().includes(up)))||null;
}
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}

function SyncDot({status,configured}){
  if(!configured)return<span title="Sem sincronização" className="w-2 h-2 rounded-full bg-slate-600 inline-block"/>;
  if(status==='syncing')return<span title="A sincronizar..." className="w-2 h-2 rounded-full bg-amber-400 inline-block spin"/>;
  if(status==='ok')return<span title="Sincronizado" className="w-2 h-2 rounded-full bg-emerald-400 inline-block"/>;
  if(status==='error')return<span title="Erro de sincronização" className="w-2 h-2 rounded-full bg-red-400 inline-block"/>;
  return<span className="w-2 h-2 rounded-full bg-slate-600 inline-block"/>;
}

// ── SUPABASE SETUP MODAL ───────────────────────────────────────
function SupabaseSetupModal({onSave,onSkip,sync}){
  const[url,setUrl]=useState('');
  const[key,setKey]=useState('');
  const[testing,setTesting]=useState(false);
  const[err,setErr]=useState('');

  async function test(){
    if(!url||!key){setErr('Preenche os dois campos.');return;}
    setTesting(true);setErr('');
    try{
      const client=supabase.createClient(url.trim(),key.trim());
      const{error}=await client.from('app_data').select('key').limit(1);
      if(error&&error.code!=='PGRST116')throw error;// PGRST116 = table empty, ok
      sync.configure(url.trim(),key.trim());
      onSave();
    }catch(e){setErr('Erro de ligação: '+e.message);}
    setTesting(false);
  }

  return(
    <Modal title="☁️ Configurar Supabase" onClose={onSkip}>
      <div className="space-y-4">
        <div className="bg-indigo-900/30 border border-indigo-700/50 rounded-xl p-4 text-sm text-indigo-200 space-y-1">

  const thisMo=active.filter(x=>getMonthKey(x.date)===curMk);

// ── PDF UPLOADER ───────────────────────────────────────────────
function PDFUploader({onGames,settings,toast,pavilhoes,setPavilhoes}){
  const[loading,setLoading]=useState(false);
  const[drag,setDrag]=useState(false);
  const inputRef=useRef();

  async function processFiles(files){
    if(!files.length)return;
    setLoading(true);
    const newGames=[];
    for(const file of files){
      try{const gs=await parsePDF(file,settings);newGames.push(...gs);}
      catch(e){toast('Erro ao ler PDF: '+e.message,'error');}
    }
    // Match pavilhoes
    const newPavs=[];
    for(const g of newGames){
      const pav=fuzzyMatch(g.local,pavilhoes);
      if(pav){g.pavilhaoId=pav.id;g.distanceKm=pav.distanceKm;}
      else if(g.local){
        const exists=pavilhoes.find(p=>p.alias.toUpperCase()===g.local.toUpperCase())||newPavs.find(p=>p.alias.toUpperCase()===g.local.toUpperCase());
        if(!exists){
          const np={id:`pav_${uid()}`,name:g.local,alias:g.local,address:g.local+', Portugal',lat:null,lon:null,distanceKm:null,notes:'',needsAddress:true};
          newPavs.push(np);
          g.pavilhaoId=np.id;
        }
      }
    }
    if(newPavs.length>0){
      setPavilhoes(ps=>[...ps,...newPavs.filter(np=>!ps.find(p=>p.alias.toUpperCase()===np.alias.toUpperCase()))]);
      toast(`${newPavs.length} novo(s) pavilhão(ões) — confirma as moradas`,'warn');
    }
    setLoading(false);
    onGames(newGames);
    if(newGames.length>0)toast(`${newGames.length} jogo(s) importado(s)`);
    else toast('Nenhum jogo encontrado neste PDF','warn');
  }

  return(
    <div className={`drop-zone p-10 text-center cursor-pointer ${drag?'drag-over':''}`}
      onDragOver={e=>{e.preventDefault();setDrag(true);}}
      onDragLeave={()=>setDrag(false)}
      onDrop={e=>{e.preventDefault();setDrag(false);processFiles([...e.dataTransfer.files].filter(f=>f.type==='application/pdf'));}}
      onClick={()=>inputRef.current.click()}>
      {loading?(
        <div className="flex flex-col items-center gap-3"><Spinner/><span className="text-slate-400">A processar...</span></div>
      ):(
        <div className="flex flex-col items-center gap-2">
          <span className="text-5xl">📄</span>
          <span className="text-slate-300 font-medium">Arrasta PDFs ou clica para importar</span>
          <span className="text-slate-500 text-xs">Comunicados de Arbitragem — AA Viseu</span>
        </div>
      )}
      <input ref={inputRef} type="file" accept=".pdf" multiple onChange={e=>processFiles([...e.target.files])}/>
    </div>
  );
}

function MonthlySummary({games,tournaments,settings}){
  const all=[...games.filter(g=>g.status!=='cancelado'),...tournaments];

  all.forEach(g=>{
    const mk=getMonthKey(g.date);if(!mk)return;
    if(!byMonth[mk])byMonth[mk]={games:[],prize:0,km:0,sub:0,total:0};
    const t=calcGameTotals(g,settings);
    byMonth[mk].games.push(g);byMonth[mk].prize+=t.prize;byMonth[mk].km+=t.kmEuros;byMonth[mk].sub+=t.subsidio;byMonth[mk].total+=t.total;
  });
  const months=Object.keys(byMonth).sort();
  if(!months.length)return<div className="text-center py-12 text-slate-500">Sem dados</div>;
  return(
    <div className="overflow-x-auto">
      <table className="w-full text-sm">
        <thead><tr className="text-slate-400 text-xs uppercase border-b border-slate-800">
          <th className="text-left py-2 pr-3">Mês Jogo</th>
          <th className="text-left py-2 pr-3">Recebimento</th>
          <th className="text-right py-2 pr-3">Jogos</th>
          <th className="text-right py-2 pr-3">Prémios</th>
          <th className="text-right py-2 pr-3">Km</th>
          <th className="text-right py-2 pr-3">Subsídios</th>
          <th className="text-right py-2">Total</th>
        </tr></thead>
        <tbody>
          {months.map(mk=>{
            const d=byMonth[mk];
            return(
              <tr key={mk} className="border-b border-slate-800/50 hover:bg-slate-900/50">
                <td className="py-2 pr-3 font-medium">{monthLabel(mk)}</td>
                <td className="py-2 pr-3 text-slate-400">{monthLabel(addMonths(mk,settings.paymentDelay||2))}</td>
                <td className="py-2 pr-3 text-right">{d.games.length}</td>
                <td className="py-2 pr-3 text-right text-indigo-300">{fmtEuro(d.prize)}</td>
                <td className="py-2 pr-3 text-right text-emerald-300">{fmtEuro(d.km)}</td>
                <td className="py-2 pr-3 text-right text-amber-300">{fmtEuro(d.sub)}</td>
                <td className="py-2 text-right font-bold">{fmtEuro(d.total)}</td>
              </tr>
            );
          })}
        </tbody>
        <tfoot><tr className="bg-slate-900 font-bold">
          <td colSpan={2} className="py-3 pr-3 text-slate-300">TOTAL ÉPOCA</td>
          <td className="py-3 pr-3 text-right">{all.length}</td>
          <td className="py-3 pr-3 text-right text-indigo-300">{fmtEuro(months.reduce((s,k)=>s+byMonth[k].prize,0))}</td>
          <td className="py-3 pr-3 text-right text-emerald-300">{fmtEuro(months.reduce((s,k)=>s+byMonth[k].km,0))}</td>
          <td className="py-3 pr-3 text-right text-amber-300">{fmtEuro(months.reduce((s,k)=>s+byMonth[k].sub,0))}</td>
          <td className="py-3 text-right text-lg">{fmtEuro(months.reduce((s,k)=>s+byMonth[k].total,0))}</td>
        </tr></tfoot>
      </table>
    </div>
  );
}

// ── JOGOS PAGE ─────────────────────────────────────────────────
function JogosPage({games,setGames,pavilhoes,setPavilhoes,settings,toast}){
  const[tab,setTab]=useState('lista');
  const[filter,setFilter]=useState('');
  const[sortKey,setSortKey]=useState('date');
  const[showAdd,setShowAdd]=useState(false);

  function handleNewGames(gs){
    setGames(prev=>{
      const existing=new Set(prev.map(g=>g.jn).filter(Boolean));
      return[...prev,...gs.filter(g=>!g.jn||!existing.has(g.jn))];
    });
  }
  function updateGame(g){setGames(prev=>prev.map(x=>x.id===g.id?g:x));}
  function deleteGame(id){setGames(prev=>prev.filter(x=>x.id!==id));}

  const filtered=useMemo(()=>{
    let gs=[...games];
    if(filter){const f=filter.toLowerCase();gs=gs.filter(g=>(g.teamA+g.teamB+g.local+g.jn+getEscalaoForPO(g.po,settings)).toLowerCase().includes(f));}
    gs.sort((a,b)=>{
      if(sortKey==='date')return b.date.split('-').reverse().join('').localeCompare(a.date.split('-').reverse().join(''));
      if(sortKey==='total')return calcGameTotals(b,settings).total-calcGameTotals(a,settings).total;
      return 0;
    });
    return gs;
  },[games,filter,sortKey,settings]);

  const[loadingId,setLoadingId]=useState(null);

  async function geocodePav(pav){
    setLoadingId(pav.id);
    const coords=await geocodeAddress(pav.address);
    if(!coords){toast('Geocodificação falhou. Verifica a morada.','error');setLoadingId(null);return;}
    let dist=null;
    if(settings.homeCoords)dist=await getRouteKm(settings.homeCoords.lat,settings.homeCoords.lon,coords.lat,coords.lon);
    setPavilhoes(prev=>prev.map(p=>p.id===pav.id?{...p,lat:coords.lat,lon:coords.lon,distanceKm:dist,needsAddress:false}:p));
    toast(dist?`${pav.alias}: ${Math.round(dist)} km de Lamego`:'Coordenadas obtidas');

// ── CHARTS ─────────────────────────────────────────────────────
function ChartWrap({type,data,options={},height=280}){
  const ref=useRef();const inst=useRef();
  useEffect(()=>{
    if(!ref.current)return;
    if(inst.current)inst.current.destroy();
    inst.current=new Chart(ref.current,{type,data,options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#94a3b8',font:{size:11}}}},
      ...(type!=='doughnut'&&type!=='pie'?{scales:{
        x:{ticks:{color:'#64748b'},grid:{color:'#1e293b'}},
        y:{ticks:{color:'#64748b'},grid:{color:'#1e293b'}}
      }}:{}),
      ...options
    }});
    return()=>{try{inst.current?.destroy();}catch{}};
  },[JSON.stringify({type,data,options})]);
  return<div style={{height}}><canvas ref={ref}/></div>;
}

// ── ESTATISTICAS PAGE ──────────────────────────────────────────
function EstatisticasPage({games,tournaments,settings}){
  const all=[...games.filter(g=>g.status!=='cancelado'),...tournaments];
  if(!all.length)return(
    <div className="text-center py-16 text-slate-500 fade-in"><div className="text-5xl mb-3">📊</div>Sem dados.</div>
  );
  const byEscalao={};
  all.forEach(g=>{const e=getEscalaoForPO(g.po,settings);byEscalao[e]=(byEscalao[e]||0)+1;});
  const byMonth={};
  all.forEach(g=>{
    const mk=getMonthKey(g.date)||'?';
    if(!byMonth[mk])byMonth[mk]={count:0,prize:0,km:0,sub:0};
    const t=calcGameTotals(g,settings);
    byMonth[mk].count++;byMonth[mk].prize+=t.prize;byMonth[mk].km+=t.kmEuros;byMonth[mk].sub+=t.subsidio;
  });
  const months=Object.keys(byMonth).sort();
  const totalKm=all.reduce((s,g)=>s+calcGameTotals(g,settings).kmDist*2,0);
  const totalEarn=all.reduce((s,g)=>s+calcGameTotals(g,settings).total,0);
  const venueCount={};all.forEach(g=>{const v=g.local||'?';venueCount[v]=(venueCount[v]||0)+1;});
  const topVenue=Object.entries(venueCount).sort((a,b)=>b[1]-a[1])[0];
  const bestMonth=months.reduce((b,k)=>{
    const va=(byMonth[k].prize+byMonth[k].km+byMonth[k].sub);
    const vb=b?(byMonth[b].prize+byMonth[b].km+byMonth[b].sub):0;
    return va>vb?k:b;
  },'');
  const COLORS=['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#14b8a6','#f97316','#a855f7'];

  return(
    <div className="space-y-6 fade-in">
      <div><h1 className="text-2xl font-bold">📊 Estatísticas</h1></div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
        <StatCard icon="🤾" label="Total Jogos" value={all.length} color="indigo"/>
        <StatCard icon="💰" label="Total Época" value={fmtEuro(totalEarn)} color="emerald"/>
        <StatCard icon="🛣️" label="Km Totais" value={`${Math.round(totalKm)} km`} color="amber"/>
        <StatCard icon="📈" label="Média/Jogo" value={fmtEuro(all.length?totalEarn/all.length:0)} color="purple"/>
      </div>
      <div className="grid grid-cols-2 gap-3">
        <div className="bg-slate-900 border border-slate-800 rounded-xl p-4">
          <div className="text-xs text-slate-400 mb-1">Pavilhão mais frequente</div>
          <div className="font-bold truncate">{topVenue?topVenue[0]:'—'}</div>
          <div className="text-xs text-slate-500">{topVenue?topVenue[1]+' jogos':''}</div>
        </div>
        <div className="bg-slate-900 border border-slate-800 rounded-xl p-4">
          <div className="text-xs text-slate-400 mb-1">Melhor mês</div>
          <div className="font-bold">{bestMonth?monthLabel(bestMonth):'—'}</div>
          <div className="text-xs text-emerald-400">{bestMonth?fmtEuro(byMonth[bestMonth].prize+byMonth[bestMonth].km+byMonth[bestMonth].sub):''}</div>
        </div>
      </div>
      <div className="bg-slate-900 border border-slate-800 rounded-xl p-4">
        <h3 className="font-semibold mb-4 text-slate-300">Jogos por Escalão</h3>
        <ChartWrap type="doughnut" height={240} data={{labels:Object.keys(byEscalao),datasets:[{data:Object.values(byEscalao),backgroundColor:COLORS,borderWidth:0}]}}/>
      </div>
      {months.length>1&&(
        <div className="bg-slate-900 border border-slate-800 rounded-xl p-4">
          <h3 className="font-semibold mb-4 text-slate-300">Jogos por Mês</h3>
          <ChartWrap type="bar" height={200} data={{labels:months.map(monthLabel),datasets:[{label:'Jogos',data:months.map(k=>byMonth[k].count),backgroundColor:'#6366f1',borderRadius:4}]}}/>
        </div>
      )}
      {months.length>0&&(
        <div className="bg-slate-900 border border-slate-800 rounded-xl p-4">
          <h3 className="font-semibold mb-4 text-slate-300">Ganhos por Mês</h3>
          <ChartWrap type="bar" height={240} data={{labels:months.map(monthLabel),datasets:[
            {label:'Prémios',data:months.map(k=>+byMonth[k].prize.toFixed(2)),backgroundColor:'#6366f1',borderRadius:2},
            {label:'Km',data:months.map(k=>+byMonth[k].km.toFixed(2)),backgroundColor:'#10b981',borderRadius:2},
            {label:'Subsídios',data:months.map(k=>+byMonth[k].sub.toFixed(2)),backgroundColor:'#f59e0b',borderRadius:2},
          ]}} options={{scales:{x:{stacked:true},y:{stacked:true}}}}/>
        </div>
      )}
    </div>
  );
}

    a.download=`arbitro_backup_${new Date().toISOString().slice(0,10)}.json`;a.click();

        if(d.games)localStorage.setItem('games',JSON.stringify(d.games));

                  <Input value={w.start} onChange={v=>upd('subsidioWindows',s.subsidioWindows.map((x,j)=>j===i?{...x,start:v}:x))} placeholder="11:30"/>
                  <span className="text-slate-500">—</span>
                  <Input value={w.end} onChange={v=>upd('subsidioWindows',s.subsidioWindows.map((x,j)=>j===i?{...x,end:v}:x))} placeholder="13:30"/>
                  <Btn size="xs" variant="danger" onClick={()=>upd('subsidioWindows',s.subsidioWindows.filter((_,j)=>j!==i))}>✕</Btn>
                </div>
              ))}
              <Btn size="sm" variant="secondary" onClick={()=>upd('subsidioWindows',[...(s.subsidioWindows||[]),{start:'',end:''}])}>+ Janela</Btn>
            </div>
          </div>
          <Btn onClick={save}>💾 Guardar</Btn>
        </div>
      )}
      {tab==='sync'&&(
        <div className="space-y-4">
          <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-4">
            <div className="flex items-center gap-3">
              <SyncDot status={sync.status} configured={sync.configured}/>
              <div>
                <div className="font-medium">{sync.configured?'Supabase ligado':'Sem sincronização cloud'}</div>
                <div className="text-xs text-slate-500">{sync.configured?sync.status==='ok'?'Dados sincronizados':'Estado: '+sync.status:'Dados apenas neste dispositivo'}</div>
              </div>
            </div>
            {sync.configured?(
              <div className="space-y-2">
                <div className="text-xs text-slate-500 bg-slate-800 rounded-lg p-3 font-mono break-all">
                  {JSON.parse(localStorage.getItem('supa_cfg')||'{}')?.url||''}
                </div>
                <div className="flex gap-3">
                  <Btn variant="secondary" onClick={()=>setShowSupaSetup(true)}>Reconfigurar</Btn>
                  <Btn variant="danger" onClick={()=>{sync.disconnect();toast('Desligado do Supabase');}}>Desligar</Btn>
                </div>
              </div>
            ):(
              <Btn onClick={()=>setShowSupaSetup(true)}>☁️ Configurar Supabase</Btn>
            )}
          </div>
          <div className="bg-slate-800/50 border border-slate-700/50 rounded-xl p-4 text-sm text-slate-400 space-y-1">
            <div className="font-medium text-slate-300">Como funciona</div>
            <div>Os dados ficam guardados localmente (localStorage) e sincronizados no Supabase.</div>
            <div>Ao abrir no tele ou noutro PC, os dados mais recentes são carregados automaticamente.</div>
            <div className="text-emerald-400 font-medium">✓ Gratuito · ✓ Sem conta necessária na app · ✓ Funciona offline</div>
          </div>
          {showSupaSetup&&<SupabaseSetupModal sync={sync} onSave={()=>{setShowSupaSetup(false);toast('Supabase ligado!');}} onSkip={()=>setShowSupaSetup(false)}/>}
        </div>
      )}
      {tab==='dados'&&(
        <div className="space-y-4">
          <div className="bg-slate-900 border border-slate-800 rounded-xl p-5 space-y-5">
            <div>
              <div className="font-medium mb-1">Exportar JSON</div>
              <div className="text-sm text-slate-400 mb-3">Backup de todos os dados.</div>
              <Btn onClick={exportData}>📤 Exportar</Btn>
            </div>
            <div className="border-t border-slate-700 pt-4">
              <div className="font-medium mb-1">Importar JSON</div>
              <div className="text-sm text-slate-400 mb-3">Substitui todos os dados actuais.</div>
              <label className="cursor-pointer">
                <Btn variant="secondary" onClick={()=>importRef.current?.click()}>📥 Importar</Btn>
                <input ref={importRef} type="file" accept=".json" onChange={importData}/>
              </label>
            </div>
            <div className="border-t border-slate-700 pt-4">
              <div className="font-medium text-red-400 mb-1">Apagar Tudo</div>
              <div className="text-sm text-slate-400 mb-3">Irreversível.</div>
              <Btn variant="danger" onClick={()=>{if(confirm('Apagar todos os dados?')){localStorage.clear();location.reload();}}}>🗑️ Apagar Tudo</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
function POSettings({mappings,onChange,onSave}){
  function upd(i,k,v){onChange(mappings.map((m,j)=>j===i?{...m,[k]:v}:m));}
  return(
    <div className="space-y-3">
      <div className="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
        <table className="w-full text-sm">
          <thead><tr className="border-b border-slate-800 text-xs text-slate-400 uppercase">
            <th className="text-left p-3">PO</th><th className="text-left p-3">Escalão</th>
            <th className="text-left p-3">€</th><th className="text-left p-3">G</th><th className="p-3"></th>
          </tr></thead>
          <tbody>
            {mappings.map((m,i)=>(
              <tr key={i} className="border-b border-slate-800/50">
                <td className="p-2"><input value={m.po} onChange={e=>upd(i,'po',e.target.value)} className="bg-slate-800 border border-slate-600 rounded px-2 py-1 text-xs w-14 text-white focus:outline-none"/></td>
                <td className="p-2"><input value={m.escalao} onChange={e=>upd(i,'escalao',e.target.value)} className="bg-slate-800 border border-slate-600 rounded px-2 py-1 text-xs w-36 text-white focus:outline-none"/></td>
                <td className="p-2"><input type="number" value={m.prize} onChange={e=>upd(i,'prize',parseFloat(e.target.value)||0)} className="bg-slate-800 border border-slate-600 rounded px-2 py-1 text-xs w-16 text-white focus:outline-none"/></td>
                <td className="p-2"><select value={m.gender} onChange={e=>upd(i,'gender',e.target.value)} className="bg-slate-800 border border-slate-600 rounded px-2 py-1 text-xs text-white focus:outline-none"><option value="M">M</option><option value="F">F</option></select></td>
                <td className="p-2"><button onClick={()=>onChange(mappings.filter((_,j)=>j!==i))} className="text-red-400 hover:text-red-300 text-xs">✕</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="flex gap-3">
        <Btn size="sm" variant="secondary" onClick={()=>onChange([...mappings,{po:'',escalao:'',prize:0,gender:'M'}])}>+ Linha</Btn>
        <Btn size="sm" onClick={onSave}>💾 Guardar</Btn>
      </div>
    </div>
  );
}

// ── APP ────────────────────────────────────────────────────────
function App(){
  const[page,setPage]=useState('dashboard');
  const[games,setGamesRaw]=useLocalStorage('games',[]);
  const[tournaments,setTournamentsRaw]=useLocalStorage('tournaments',[]);
  const[pavilhoes,setPavilhoesRaw]=useLocalStorage('pavilhoes',DEFAULT_PAVILHOES);
  const[settings,setSettingsRaw]=useLocalStorage('settings',DEFAULT_SETTINGS);
  const{toasts,addToast,removeToast}=useToast();
  const sync=useSupaSync();
  const[showSupaFirst,setShowSupaFirst]=useState(false);
  const[loaded,setLoaded]=useState(false);

  // Wrap setters to also push to Supabase
  function setGames(v){
    setGamesRaw(v);
    const val=typeof v==='function'?v(games):v;
    sync.push('games',val);
  }
  function setTournaments(v){
    setTournamentsRaw(v);
    const val=typeof v==='function'?v(tournaments):v;
    sync.push('tournaments',val);
  }
  function setPavilhoes(v){
    setPavilhoesRaw(v);
    const val=typeof v==='function'?v(pavilhoes):v;
    sync.push('pavilhoes',val);
  }
  function setSettings(v){
    setSettingsRaw(v);
    const val=typeof v==='function'?v(settings):v;
    sync.push('settings',val);
  }

  // On startup: load from Supabase (overrides localStorage)
  useEffect(()=>{
    async function init(){
      if(sync.configured){
        const remote=await sync.loadAll();
        if(remote){
          if(remote.games)setGamesRaw(remote.games);
          if(remote.tournaments)setTournamentsRaw(remote.tournaments);
          if(remote.pavilhoes)setPavilhoesRaw(remote.pavilhoes);
          if(remote.settings)setSettingsRaw(remote.settings);
        }
      } else if(!localStorage.getItem('supa_first_shown')){
        // Show setup on first launch
        localStorage.setItem('supa_first_shown','1');
        setTimeout(()=>setShowSupaFirst(true),800);
      }
      setLoaded(true);
      // Geocode home
      if(!settings.homeCoords&&settings.homeAddress){
        const c=await geocodeAddress(settings.homeAddress);
        if(c)setSettings(s=>({...s,homeCoords:c}));
      }
      // Geocode pavilhoes without coords
      const needGeo=DEFAULT_PAVILHOES.filter(dp=>{
        const existing=pavilhoes.find(p=>p.id===dp.id);
        return existing&&!existing.lat;
      });
      for(const dp of needGeo){
        await sleep(1200);
        const c=await geocodeAddress(dp.address);
        if(!c)continue;
        const hc=settings.homeCoords;
        let dist=null;
        if(hc)dist=await getRouteKm(hc.lat,hc.lon,c.lat,c.lon);
        setPavilhoesRaw(prev=>prev.map(p=>p.id===dp.id?{...p,lat:c.lat,lon:c.lon,distanceKm:dist}:p));
        await sleep(300);
      }
    }
    init();
  },[]);

  if(!loaded)return(
    <div className="min-h-screen bg-slate-950 flex items-center justify-center">
      <div className="text-center space-y-3">
        <div className="text-5xl">🤾</div>
        <div className="text-slate-400">A carregar...</div>
        <Spinner/>
      </div>
    </div>
  );

  return(
    <div className="min-h-screen bg-slate-950">
      <NavBar page={page} setPage={setPage} syncStatus={sync.status} syncConfigured={sync.configured}
        onSyncClick={()=>setPage('definicoes')}/>
      <main className="md:pl-56 pb-24 md:pb-8 px-4 pt-4 max-w-5xl">
        {page==='dashboard'&&<Dashboard games={games} tournaments={tournaments} settings={settings}/>}
        {page==='jogos'&&<JogosPage games={games} setGames={setGames} pavilhoes={pavilhoes} setPavilhoes={setPavilhoes} settings={settings} toast={addToast}/>}
        {page==='torneios'&&<TorneiosPage tournaments={tournaments} setTournaments={setTournaments} pavilhoes={pavilhoes} settings={settings} toast={addToast}/>}
        {page==='pavilhoes'&&<PavilhoesPage pavilhoes={pavilhoes} setPavilhoes={setPavilhoes} settings={settings} toast={addToast}/>}
        {page==='estatisticas'&&<EstatisticasPage games={games} tournaments={tournaments} settings={settings}/>}
        {page==='definicoes'&&<DefinicoesPage settings={settings} setSettings={setSettings} games={games} tournaments={tournaments} pavilhoes={pavilhoes} setPavilhoes={setPavilhoes} toast={addToast} sync={sync}/>}
      </main>
      <div className="fixed top-4 right-4 z-[100] flex flex-col gap-2 pointer-events-none">
        {toasts.map(t=><div key={t.id} className="pointer-events-auto"><Toast msg={t.msg} type={t.type} onClose={()=>removeToast(t.id)}/></div>)}
      </div>
      {showSupaFirst&&<SupabaseSetupModal sync={sync} onSave={()=>{setShowSupaFirst(false);addToast('Supabase ligado! Dados sincronizados.');}} onSkip={()=>setShowSupaFirst(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
